name: Partner Video Upload Pipeline

on:
  workflow_dispatch:

  # Optional: keep for automatic recovery if a runner dies
  schedule:
    - cron: "0 */6 * * *"

concurrency:
  group: pipeline-upload
  cancel-in-progress: false

jobs:
  upload:
    runs-on: ubuntu-latest

    # GitHub hosted runners max at 24h
    timeout-minutes: 1440

    env:
      GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
      GITHUB_USERNAME: ${{ secrets.GH_USERNAME }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      RESULTS_DIR: results_repo

    steps:
      # Checkout pipeline repo
      - name: Checkout pipeline repo
        uses: actions/checkout@v4

      # Checkout results/state repo
      - name: Checkout results repo
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.GH_USERNAME }}/partner_videos_results
          token: ${{ secrets.PAT_TOKEN }}
          path: results_repo

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install psycopg2-binary requests

      - name: Configure git credentials
        run: |
          git config --global user.email "pipeline@partner-videos.local"
          git config --global user.name "Partner Video Pipeline"

          git config --global credential.helper store

          echo "https://${{ secrets.PAT_TOKEN }}@github.com" > ~/.git-credentials

      - name: Run pipeline
        run: python pipeline.py

      - name: Commit state updates
        working-directory: results_repo
        run: |

          git config user.email "pipeline@partner-videos.local"
          git config user.name "Partner Video Pipeline"

          git add pipeline_state.json upload_results.json

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "pipeline: $(date -u '+%Y-%m-%d %H:%M UTC')"

          git pull --rebase
          git push
